<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى جنى ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@400;700&display=swap');

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #fff5f7;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.2);
            text-align: center;
            border: 1px solid #ffd1dc;
        }

        h1 { font-family: 'Amiri', serif; color: #ff4d6d; font-size: 2.5em; }

        /* إطار الفيديو الأحمر الاحترافي */
        .video-box {
            width: 100%;
            background: #000;
            border: 8px solid #cc0000;
            border-radius: 20px;
            margin: 20px 0;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            position: relative;
        }

        video { width: 100%; display: block; border-radius: 10px; }

        .video-label {
            background: #cc0000;
            color: white;
            padding: 8px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .poem {
            font-family: 'Amiri', serif;
            font-size: 1.4em;
            background: #fffafa;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            line-height: 1.8;
            border-right: 5px solid #ff4d6d;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            height: 50px;
            position: relative;
        }

        .btn {
            padding: 10px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-yes { background: #ff4d6d; color: white; box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3); }
        .btn-no { background: #eee; color: #888; position: absolute; }

        #success { display: none; color: #ff4d6d; font-weight: bold; font-size: 1.3em; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container" id="card">
        <h1>إلى جنى.. ❤️</h1>
        <p>محمود التركي بيقولك: "حبيبي هو.."</p>

        <div class="video-box">
            <video controls poster="kitty.jpg">
                <source src="El2oxQd95z4.mp3" type="audio/mpeg">
                المتصفح لا يدعم التشغيل.
            </video>
            <div class="video-label">محمود التركي - حبيبي هو</div>
        </div>

        <div class="poem">
            أعاتبُ قلبي فيكِ إن زادَ نبضُـهُ <br>
            فأنتِ لهُ النبضاتُ، وأنتِ لهُ الصدرُ <br>
            <br>
            خُـذي الوعـدَ مِني، لا بـديلَ لـحبِّـنا <br>
            فـأنتِ المَـدا، وأنتِ السَّـنا، وأنتِ العُـمرُ
        </div>

        <p style="font-weight: bold; color: #ff4d6d;">سامحتيني؟ 🥺</p>

        <div class="btn-group">
            <button class="btn btn-yes" onclick="sendMsg()">سامحتك</button>
            <button class="btn btn-no" id="no-btn" onmouseover="moveNo()">لا</button>
        </div>
        <div id="success">شكراً يا أغلى جنى! وصلتني الرسالة ❤️</div>
    </div>

    <script>
        const token = '8345183828:AAEqq2_V3Xu9x0hrk7rTVfl_489VFCW3YGY';
        const chat_id = '8115519784';

        function moveNo() {
            const btn = document.getElementById('no-btn');
            btn.style.left = Math.random() * 80 + '%';
            btn.style.top = Math.random() * 80 + '%';
            btn.style.position = 'fixed';
        }

        function sendMsg() {
            document.querySelector('.btn-group').style.display = 'none';
            document.getElementById('success').style.display = 'block';
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent("جنى سامحتك يا معتصم! ❤️")}`);
        }
    </script>
</body>
</html>
