<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى تغريد.. اعتذار وحب ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@400;700&display=swap');

        body {
            font-family: 'Cairo', sans-serif;
            background: #fff5f7;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            position: relative;
        }

        /* أنيميشن تساقط الورد والقلوب */
        .snowflake {
            position: absolute;
            width: 15px;
            height: 15px;
            background: #ffb6c1;
            border-radius: 50%;
            opacity: 0.8;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) translateX(0); }
            100% { transform: translateY(110vh) translateX(20px); }
        }

        /* كيتي المجسمة الأصلية رجعت! */
        .kitty-character {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 130px;
            z-index: 1000;
            cursor: pointer;
            animation: kittyHappy 2s infinite ease-in-out;
            transition: all 0.5s;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
        }

        @keyframes kittyHappy {
            0%, 100% { transform: scale(1) translateY(0) rotate(0deg); }
            50% { transform: scale(1.15) translateY(-30px) rotate(-5deg); }
        }

        /* فقاعة الكلام */
        .speech-bubble {
            position: fixed;
            bottom: 180px;
            right: 40px;
            background: white;
            padding: 20px;
            border-radius: 25px;
            border: 3px solid #ff4d6d;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.3);
            max-width: 250px;
            text-align: center;
            font-weight: bold;
            color: #d63384;
            z-index: 1001;
            line-height: 1.6;
        }

        .speech-bubble::after {
            content: '';
            position: absolute; bottom: -15px; right: 40px;
            border-width: 15px 15px 0; border-style: solid;
            border-color: white transparent transparent;
        }

        /* كارت الصلح النهائي */
        .main-container {
            max-width: 500px;
            width: 90%;
            background: white;
            padding: 35px;
            border-radius: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            text-align: center;
            border: 2px solid #ffd1dc;
            display: none;
            position: relative;
        }

        .kitty-kiss {
            position: absolute; top: -60px; left: 50%;
            transform: translateX(-50%); width: 100px;
            display: none; animation: kissEmote 1.5s ease-out;
        }

        @keyframes kissEmote {
            0% { transform: translateX(-50%) scale(0); opacity: 0; }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }

        .player-box {
            background: #cc0000; border: 6px solid #a00000;
            border-radius: 20px; margin: 25px 0; overflow: hidden;
        }

        iframe { width: 100%; height: 90px; border: none; }

        .btn-yes {
            background: linear-gradient(45deg, #ff4d6d, #ff8fa3);
            color: white; padding: 15px 40px; border: none;
            border-radius: 50px; font-size: 1.2em; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }
    </style>
</head>
<body>

    <script>
        for (let i = 0; i < 30; i++) {
            let flake = document.createElement('div');
            flake.className = 'snowflake';
            flake.style.left = Math.random() * 100 + 'vw';
            flake.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(flake);
        }
    </script>

    <div id="bubble" class="speech-bubble">أهلاً تغريد! ممكن أحكي معك شوي؟ 🥺</div>
    <div class="kitty-character" onclick="chat()">
        <img src="https://i.ibb.co/3ykpY6v9/1000101754.png" style="width: 100%;" alt="3D Kitty Icon">
    </div>

    <div class="main-container" id="content">
        <div class="kitty-kiss" id="kittyKiss">
            <img src="https://media.tenor.com/g9f5z3k0s6AAAAAC/hello-kitty-kiss.gif" style="width: 100%;" alt="Kitty Kiss">
        </div>

        <h1 style="color: #ff4d6d; font-family: 'Amiri'; font-size: 2.2em;">إلى تغريد.. قلبي ❤️</h1>
        <p style="font-style: italic; color: #ff4d6d; font-family: 'Amiri'; font-size: 1.3em; margin: 10px 0;">"أعاتب قلبي إن زاد فيكي نبضه.."</p>
        
        <div class="player-box">
            <div style="color:white; padding:5px; font-weight:bold;">🎵 محمود التركي - حبيبي هو</div>
            <iframe src="https://www.youtube.com/embed/SshsX6YI2jQ"></iframe>
        </div>
        
        <p style="font-size: 1.1em; color: #555;">معتصم بيعرف إنه الزعل ما بيليق فيكي.. ❤️</p>
        <p style="font-size: 1.1em; color: #d63384; font-weight: bold;">بتسامحيه ونرجع أحسن من الأول؟ 🥺</p>
        <button class="btn-yes" onclick="done()">سامحتك يا معتصم ❤️</button>
    </div>

    <script>
        let msgIndex = 0;
        const messages = [
            "أهلاً تغريد! ممكن أحكي معك شوي؟ 🥺",
            "معتصم قلبه واجعه وما بيتحمل زعلك.. 😿",
            "إنتي بتعرفي إنك غالية كتير، والصلح سيد الأحكام!",
            "أعاتب قلبي إن زاد فيكي نبضه.. شوفي شو محضرلك..",
            "اضغطي عليّ آخر مرة وخلينا نصالح بعض! ✨"
        ];

        function chat() {
            msgIndex++;
            const bubble = document.getElementById('bubble');
            const content = document.getElementById('content');
            const kittyKiss = document.getElementById('kittyKiss');
            
            if (msgIndex < messages.length) {
                bubble.innerText = messages[msgIndex];
            } else {
                bubble.style.display = 'none';
                content.style.display = 'block';
                setTimeout(() => { kittyKiss.style.display = 'block'; }, 500);
            }
        }

        function done() {
            fetch(`https://api.telegram.org/bot8345183828:AAEqq2_V3Xu9x0hrk7rTVfl_489VFCW3YGY/sendMessage?chat_id=8115519784&text=${encodeURIComponent("🎉 تغريد سامحتك يا معتصم! الصلح تم وكيتي المجسمة شاهدة! ❤️")}`);
            alert("أحلى خبر! معتصم هسا طاير من الفرح ❤️");
        }
    </script>
</body>
</html>
