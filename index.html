<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مفاجأة لطيفة 💗</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:url("104be3a230ca00148c8b279c1395edcc.jpg") repeat;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.youtube{
  width:100%;
  max-width:1px;
  height:1px;
  overflow:hidden;
}

.scene{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.bubble{
  background:white;
  padding:12px 16px;
  border-radius:20px;
  max-width:260px;
  text-align:center;
  font-size:16px;
  margin-bottom:10px;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
}

#kitty{
  width:200px;
  animation: float 2.5s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
  100%{transform:translateY(0)}
}

.heart{
  position:absolute;
  font-size:24px;
  animation:fly 2s linear forwards;
}

@keyframes fly{
  from{transform:translateY(0); opacity:1;}
  to{transform:translateY(-120px); opacity:0;}
}
</style>
</head>

<body>

<!-- الأغنية من اليوتيوب -->
<div class="youtube">
<iframe id="song" src="https://www.youtube.com/embed/xHMd2LLNYn8?si=JeM-R2eg9_PFuXsCEI2oxQd95z4.mp3&autoplay=1&rel=0&loop=1&playlist=xHMd2LLNYn8" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<div class="scene">
<div id="bubble" class="bubble">
استمتعي بالمفاجأة 💝
</div>

<img id="kitty" src="kitty.png">

</div>

<script>
const texts = [
"مرحبا يا أحلى بنت بالدنيا 💕",
"بعرف إنك قوية حتى لو تعبتي",
"وجودك بالدنيا فرق كبير 🌸",
"اسمعي هالكلمات الك...",
"يا زهرة العمر يا ضحكة نهاري\nفي صوتك الأمان وفي قلبك داري 💗",
"موووواه 💋"
];

let i = 0;

function showNext(){
  const bubble = document.getElementById("bubble");
  bubble.innerText = texts[i];

  if(texts[i].includes("موووواه")){
    kissEffect();
  }

  i++;

  if(i < texts.length){
    setTimeout(showNext, 3000);
  }
}

window.onload = () => {
  showNext();
};

function kissEffect(){
  for(let j=0;j<6;j++){
    const h = document.createElement("div");
    h.className="heart";
    h.innerText="💗";
    h.style.left = (window.innerWidth/2 + (Math.random()*80-40))+"px";
    h.style.top = "420px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),2000);
  }
}
</script>

</body>
</html>
