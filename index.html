<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى إيلاف ❤️</title>
    <style>
        body {
            background: #fff5f7;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden; /* لمنع أي مشاكل في الحركة */
        }

        /* كيتي: جعلناها Fixed ومع z-index عالي جداً لضمان ظهورها فوق كل شيء */
        .kitty-fixed {
            position: fixed;
            bottom: 15px;
            right: 15px;
            width: 90px;
            z-index: 10000; /* أعلى رقم لضمان عدم اختفائها */
            pointer-events: auto;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .container {
            max-width: 380px;
            width: 85%;
            background: white;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            border: 2px solid #ffd1dc;
            position: relative;
            z-index: 5; /* أقل من كيتي */
        }

        .player {
            background: #cc0000;
            border-radius: 15px;
            padding: 10px;
            margin: 15px 0;
            border: 4px solid #a00000;
        }

        iframe { width: 100%; height: 80px; border: none; }

        .btn {
            background: #ff4d6d;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 50px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }

        /* الورد المتساقط */
        .rose {
            position: absolute;
            top: -20px;
            z-index: 1;
            animation: fall 4s linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <img src="https://media.tenor.com/g9f5z3k0s6AAAAAC/hello-kitty-kiss.gif" class="kitty-fixed" alt="Kitty">

    <div class="container">
        <h1 style="color: #ff4d6d; margin: 0;">إلى إيلاف.. قلبي ❤️</h1>
        <div class="player">
            <iframe src="https://www.youtube.com/embed/SshsX6YI2jQ"></iframe>
        </div>
        <p>معتصم بيوثق فيكي ثقة عمياء.. ❤️</p>
        <p style="font-weight:bold; color:#d63384;">أوعديه تضلي مخلصة إله؟ 🥺</p>
        <button class="btn" onclick="send()">أوعدك يا معتصم ❤️</button>
    </div>

    <script>
        // ورد متساقط بسيط
        setInterval(() => {
            const r = document.createElement('div');
            r.className = 'rose';
            r.innerHTML = '🌸';
            r.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(r);
            setTimeout(() => r.remove(), 4000);
        }, 300);

        function send() {
            fetch(`https://api.telegram.org/bot8345183828:AAEqq2_V3Xu9x0hrk7rTVfl_489VFCW3YGY/sendMessage?chat_id=8115519784&text=${encodeURIComponent("إيلاف وعدتك يا معتصم! ❤️")}`);
            alert("وصلت الرسالة لمعتصم! ❤️");
        }
    </script>
</body>
</html>
