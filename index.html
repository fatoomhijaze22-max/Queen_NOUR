<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى جنى.. الوحيدة في قلبي 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;700&display=swap');

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe4e1 100%);
            color: #4a4a4a;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            cursor: pointer;
        }

        .container {
            max-width: 600px;
            width: 90%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(255, 182, 193, 0.4);
            border: 1px solid #ffd1dc;
            text-align: center;
            animation: fadeIn 1.2s ease-in-out;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-family: 'Amiri', serif;
            color: #ff4d6d;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .poem-card {
            background: rgba(255, 240, 245, 0.5);
            border-right: 5px solid #ff4d6d;
            padding: 25px;
            margin: 25px 0;
            font-family: 'Amiri', serif;
            font-size: 1.55em;
            color: #222;
            border-radius: 15px;
            line-height: 1.8;
            font-style: italic;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 35px;
            height: 60px;
            position: relative;
        }

        .btn {
            padding: 12px 35px;
            font-size: 1.1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .btn-yes {
            background: linear-gradient(45deg, #ff4d6d, #ff8fa3);
            color: white;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4);
        }

        .btn-no {
            background: #fff;
            color: #aaa;
            border: 1px solid #eee;
            position: absolute;
            transition: 0.1s;
        }

        #success {
            display: none;
            animation: zoomIn 0.8s forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .hint {
            position: fixed;
            bottom: 20px;
            font-size: 0.85em;
            color: #ff4d6d;
            background: #fff;
            padding: 10px 25px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 100;
            font-weight: bold;
        }
    </style>
</head>
<body onclick="playSong()">

    <audio id="loveSong" loop preload="auto">
        <source src="El2oxQd95z4.mp3" type="audio/mpeg">
    </audio>

    <div class="container" id="card">
        <h1>إلى جنى.. عمري ❤️</h1>
        <p style="font-size: 1.1em;">وعدتُكِ ألا أخلفَ وعداً، وأنتِ تعرفين أنكِ الوحيدة في قلبي..</p>

        <div class="poem-card">
            "أكتر من اللي أنا بحلم بيه <br>
            مش قادرة أخبّي أنا حاسّة إيه" <br>
            <br>
            فـأنتِ المَـدا، وأنتِ السَّـنا، وأنتِ العُـمرُ
        </div>

        <p style="font-weight: bold; color: #ff4d6d; font-size: 1.2em;">هل تصفحين عن معتصم؟ 🥺</p>

        <div class="btn-group">
            <button class="btn btn-yes" onclick="accepted()">سامحتك يا معتصم</button>
            <button class="btn btn-no" id="no-btn" onmouseover="escape()">لا، لسه زعلانة</button>
        </div>
    </div>

    <div id="success" class="container" style="display:none;">
        <h1 style="font-size: 3em;">شكراً يا جنى! ❤️</h1>
        <p style="font-size: 1.4em; color: #ff4d6d;">وعد من معتصم: رح أحبك للأبد.</p>
        <img src="https://i.imgur.com/G5g2mH5.png" width="120">
    </div>

    <div class="hint" id="hint">انقري في أي مكان لتشغيل أغنية أصالة 🎵</div>

    <script>
        const TOKEN = '8345183828:AAEqq2_V3Xu9x0hrk7rTVfl_489VFCW3YGY';
        const CHAT_ID = '8115519784';
        let isStarted = false;

        function playSong() {
            if (!isStarted) {
                const audio = document.getElementById('loveSong');
                audio.play().then(() => {
                    isStarted = true;
                    document.getElementById('hint').style.display = 'none';
                }).catch(err => console.log("بانتظار الضغط لتشغيل الصوت"));
            }
        }

        function escape() {
            const btn = document.getElementById('no-btn');
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            btn.style.zIndex = '1000';
        }

        function accepted() {
            document.getElementById('card').style.display = 'none';
            document.getElementById('success').style.display = 'block';

            // إرسال الإشعار لتليجرام
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent("🎉 جنى سامحتك يا معتصم! ❤️")}`);

            // تأثير القلوب
            for(let i=0; i<35; i++) {
                setTimeout(createHeart, i * 100);
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = '25px';
            heart.style.zIndex = '1000';
            heart.style.animation = `float ${Math.random() * 2 + 2}s linear forwards`;
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }

        const style = document.createElement('style');
        style.innerHTML = `@keyframes float { to { transform: translateY(-110vh); opacity: 0; } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
