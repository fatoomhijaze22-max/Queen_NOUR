<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>For you</title>

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

#scene{
  position:relative;
  width:100%;
  height:100%;
  background:url("104be3a230ca00148c8b279c1395edcc.jpg") center/cover no-repeat;
}

/* هالو كيتي ضخمة جدا */
#kitty{
  position:absolute;
  width:620px;
  left:50%;
  top:110%;
  transform:translateX(-50%);
  transition:top 2.5s ease,left 2s ease;
  filter:drop-shadow(0 18px 30px rgba(0,0,0,.35));
  animation:soft 4s infinite ease-in-out;
  cursor:pointer;
  z-index:5;
}

/* حركة أنثوية ناعمة */
@keyframes soft{
  0%{transform:translateX(-50%) rotate(0deg) scale(1);}
  25%{transform:translateX(-50%) rotate(1.2deg) scale(1.02);}
  50%{transform:translateX(-50%) rotate(0deg) scale(1.04);}
  75%{transform:translateX(-50%) rotate(-1.2deg) scale(1.02);}
  100%{transform:translateX(-50%) rotate(0deg) scale(1);}
}

/* بالون الكلام */
#bubble{
  position:absolute;
  padding:18px 24px;
  background:white;
  border-radius:35px;
  font-size:20px;
  box-shadow:0 8px 20px rgba(0,0,0,.3);
  display:none;
  z-index:10;
}

/* قلوب */
.heart{
  position:absolute;
  font-size:26px;
  animation:heartUp 2.5s ease forwards;
  pointer-events:none;
  z-index:9;
}
@keyframes heartUp{
  from{transform:translateY(0) scale(1);opacity:1;}
  to{transform:translateY(-140px) scale(1.4);opacity:0;}
}

/* ورد */
.flower{
  position:absolute;
  font-size:28px;
  animation:flowerFall 3.5s linear forwards;
  pointer-events:none;
  z-index:9;
}
@keyframes flowerFall{
  from{transform:translateY(-40px);opacity:1;}
  to{transform:translateY(260px);opacity:0;}
}

/* رقصة */
.dance{
  animation:dance 0.35s infinite alternate !important;
}
@keyframes dance{
  from{transform:translateX(-50%) rotate(-7deg) scale(1.05);}
  to{transform:translateX(-50%) rotate(7deg) scale(1.05);}
}

/* نجوم خفيفة بالخلفية */
.star{
  position:absolute;
  font-size:18px;
  animation:fadeStar 1.5s linear forwards;
  pointer-events:none;
}
@keyframes fadeStar{
  from{opacity:1;}
  to{opacity:0;transform:scale(1.8);}
}

#hint{
  position:absolute;
  bottom:15px;
  width:100%;
  text-align:center;
  color:white;
  font-size:17px;
  text-shadow:0 2px 6px rgba(0,0,0,.6);
  z-index:12;
}
</style>
</head>
<body>

<div id="scene">

  <div id="bubble"></div>
  <img id="kitty" src="kitty.png">
  <div id="hint">إلمسي هالو كيتي 🌸</div>
  <audio id="song" src="EI2oxQd95z4.mp3"></audio>

</div>

<script>
const kitty  = document.getElementById("kitty");
const bubble = document.getElementById("bubble");
const song   = document.getElementById("song");
const hint   = document.getElementById("hint");

let started=false;
let step=0;

const texts=[
  "مرحبا يا جميلة 💗",
  "في ناس وجودهم يفرّق كثير ✨",
  "وأنتِ منهم 🌸",
  "هاي قلوب وورد إلك 💖🌷",
  "يلا نرقص سوا 🎶"
];

/* دخول من تحت الشاشة */
setTimeout(()=>{
  kitty.style.top="25%";
},500);

/* تحريك ناعم بين أماكن */
function moveSoft(){
  const w=window.innerWidth-650;
  const h=window.innerHeight-600;

  const x=Math.random()*w;
  const y=Math.random()*h;

  kitty.style.left=x+"px";
  kitty.style.top=y+"px";
}

/* كتابة ناعمة بالبالون */
function typeText(text){
  bubble.style.display="block";
  bubble.innerText="";

  const r=kitty.getBoundingClientRect();
  bubble.style.left=(r.left+r.width/2)+"px";
  bubble.style.top=(r.top-90)+"px";
  bubble.style.transform="translateX(-50%)";

  let i=0;
  const t=setInterval(()=>{
    bubble.innerText+=text[i];
    i++;
    if(i>=text.length) clearInterval(t);
  },45);
}

/* قلوب حولها */
function hearts(){
  const r=kitty.getBoundingClientRect();
  for(let i=0;i<10;i++){
    const h=document.createElement("div");
    h.className="heart";
    h.innerText="💖";
    h.style.left=(r.left+r.width/2+Math.random()*120-60)+"px";
    h.style.top=(r.top+100)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),2500);
  }
}

/* ورد نازل */
function flowers(){
  for(let i=0;i<12;i++){
    const f=document.createElement("div");
    f.className="flower";
    f.innerText="🌸";
    f.style.left=Math.random()*window.innerWidth+"px";
    f.style.top="-30px";
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),3500);
  }
}

/* نجوم لطيفة دايمًا */
setInterval(()=>{
  if(!started) return;
  const s=document.createElement("div");
  s.className="star";
  s.innerText="✨";
  s.style.left=Math.random()*window.innerWidth+"px";
  s.style.top=Math.random()*window.innerHeight+"px";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),1500);
},400);

function startShow(){
  if(started) return;
  started=true;
  hint.style.display="none";

  moveSoft();
  typeText(texts[0]);
  hearts();

  const timer=setInterval(()=>{

    step++;
    moveSoft();
    typeText(texts[step]);

    if(step===2){
      hearts();
    }

    if(step===3){
      hearts();
      flowers();
    }

    if(step===4){
      song.play().catch(()=>{});
      kitty.classList.add("dance");
      hearts();
      clearInterval(timer);
    }

  },2800);
}

kitty.addEventListener("click",startShow);
kitty.addEventListener("touchstart",startShow);
</script>

</body>
</html>
